<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in - HweiGuide</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f5efe2;
      --card-bg: #ffffff;
      --card-border: #e6e2db;
      --text-main: #101828;
      --text-muted: #667085;
      --danger-bg: #fff1f2;
      --danger-border: #fecdd3;
      --danger-text: #b42318;
      --button-bg: #ff3b4a;
      --button-hover: #e12b39;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.82), transparent 38%),
        linear-gradient(160deg, #f8f1df 0%, #efe3cd 48%, #eadcc8 100%);
      color: var(--text-main);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .card {
      max-width: 760px;
      width: 100%;
      padding: 40px 36px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.10);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 3vw, 2.7rem);
      line-height: 1.1;
    }

    .meta {
      margin-bottom: 18px;
      color: var(--text-muted);
      font-size: 1.02rem;
    }

    .notice {
      display: none;
      margin: 0 auto 20px;
      max-width: 520px;
      padding: 12px 14px;
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .notice.show { display: block; }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      background: var(--button-bg);
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      transition: background-color 0.18s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--button-hover);
    }

    .footnote {
      margin-top: 18px;
      color: #98a2b3;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in to view the HweiGuide</h1>
    <div class="meta">Access is restricted to Patreon members with the Hwei Apprentice tier.</div>
    <div class="notice" id="signin-notice" role="alert"></div>
    <a class="btn" href="/auth/patreon">Login with Patreon</a>
    <div class="footnote">After signing in, you&rsquo;ll be redirected to the guide if your Patreon tier matches.</div>
  </div>

  <script>
    (function() {
      const messages = {
        tier_required: 'Your Patreon account is signed in, but it does not include the required Hwei Apprentice tier.',
        oauth_failed: 'Patreon sign-in did not complete successfully. Please try again.'
      };

      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      const notice = document.getElementById('signin-notice');

      if (error && messages[error]) {
        notice.textContent = messages[error];
        notice.classList.add('show');
      }
    })();
  </script>
</body>
</html>
